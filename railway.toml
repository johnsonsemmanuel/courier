[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader && npm ci && npm run build"

[deploy]
# Wipes DB and loads DatabaseSeeder on every deploy/restart (demo/test data only).
startCommand = "sh -c 'php artisan migrate:fresh --seed --force && php -S 0.0.0.0:$PORT -t /app/public /app/railway-router.php'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
